<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc" color="#D4887A">
  <title id="title">QuoteMatic logo</title>
  <desc id="desc">Circular Q-shaped logo with two vertical rounded bars in the center.</desc>

  <!-- Main Q outline -->
  <circle
    cx="800"
    cy="800"
    r="720"
    fill="none"
    stroke="currentColor"
    stroke-width="130"
  />

  <!-- Q tail -->
  <path
    d="M1125 1200 L1360 1435"
    fill="none"
    stroke="currentColor"
    stroke-width="130"
    stroke-linecap="round"
  />

  <!-- Pause / quote bars -->
  <rect x="560" y="480" width="160" height="480" rx="80" fill="currentColor" />
  <rect x="800" y="480" width="160" height="480" rx="80" fill="currentColor" />
</svg>
